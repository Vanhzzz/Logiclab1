services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: labdb
      MYSQL_USER: lab
      MYSQL_PASSWORD: labpass
      MYSQL_ROOT_PASSWORD: rootpass
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: lab
      DB_PASSWORD: labpass
      DB_NAME: labdb
      FLASK_SECRET: local-dev-secret-change-me
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
