<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'Blackbox Shop' }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="left-actions">
      <form action="{{ url_for('reset_lab') }}" method="post" onsubmit="return confirm('Reset lab data?');">
        <button class="reset-btn" type="submit">Reset lab</button>
      </form>
      <a class="brand" href="{{ url_for('home') }}">Blackbox Shop</a>
    </div>
    <nav class="nav">
      <a href="{{ url_for('home') }}">Home</a>
      <span class="nav-sep">|</span>
      <a href="{{ url_for('account') }}">My account</a>
      <span class="nav-sep">|</span>
      <a class="cart-link" href="{{ url_for('cart') }}" aria-label="Cart">
        <span class="cart-icon">▱</span>
        <span>{{ cart_count }}</span>
      </a>
    </nav>
  </header>

  <main class="page">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-wrap">
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
