{% extends 'base.html' %}
{% block content %}
<section class="auth-card">
  <h1>Login</h1>
  <p class="muted">Use the provided lab account.</p>
  <form method="post" action="{{ url_for('login_post') }}" class="form">
    <label>Username</label>
    <input name="username" autocomplete="username" value="user1">
    <label>Password</label>
    <input name="password" type="password" autocomplete="current-password" value="user1">
    <button class="primary-btn" type="submit">Login</button>
  </form>
</section>
{% endblock %}
